name: Update Fake Views

on:
  schedule:
    - cron: '*/30 * * * *'  # runs every 30 minutes
  workflow_dispatch:        # also allows manual trigger

jobs:
  update-views:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Update Fake Counter
        run: |
          FILE="profile-views.md"
          CURRENT=$(grep -oP '(?<=<span id="fakeCounter">)[0-9]+(?=</span>)' $FILE)
          INCREMENT=$((RANDOM % 3 + 1))  # +1 to 3
          NEW=$((CURRENT + INCREMENT))
          sed -i "s/<span id=\"fakeCounter\">$CURRENT<\/span>/<span id=\"fakeCounter\">$NEW<\/span>/" $FILE

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-views.md
          git commit -m "Update fake views"
          git push
